name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer & System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            python3-dev \
            python3-venv \
            build-essential \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            git \
            zip \
            unzip \
            openjdk-17-jdk

          pip install buildozer cython

      - name: Install Android SDK (into Buildozer default path)
        run: |
          export SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_ROOT/cmdline-tools
          cd $SDK_ROOT/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          rm commandlinetools-linux-11076708_latest.zip

          mkdir -p $SDK_ROOT/tools/bin
          ln -s $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $SDK_ROOT/tools/bin/sdkmanager

          # 接受所有许可
          yes | $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT --licenses

          # 安装必需的组件
          $SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_ROOT \
            "platform-tools" "build-tools;37.0.0" "platforms;android-33"

      - name: Build APK
        run: |
          # 覆盖系统预装的 Android SDK 路径，强制 Buildozer 使用我们安装的 SDK
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          # 清除系统 NDK 环境变量，让 Buildozer 自己管理 NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_ROOT
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stock-manager-apk
          path: bin/*.apk
