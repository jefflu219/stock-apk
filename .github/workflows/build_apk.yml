name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer & System Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            python3-dev \
            python3-venv \
            build-essential \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            git \
            zip \
            unzip \
            openjdk-17-jdk

          pip install buildozer cython

      - name: Install Android SDK Commandline Tools
        run: |
          sudo mkdir -p /usr/local/android-sdk/cmdline-tools
          cd /usr/local/android-sdk/cmdline-tools
          sudo wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          sudo unzip -q commandlinetools-linux-11076708_latest.zip
          sudo mv cmdline-tools latest
          sudo rm commandlinetools-linux-11076708_latest.zip

          # 创建 buildozer 期望的旧版 tools/bin 结构
          sudo mkdir -p /usr/local/android-sdk/tools/bin
          sudo ln -s /usr/local/android-sdk/cmdline-tools/latest/bin/sdkmanager /usr/local/android-sdk/tools/bin/sdkmanager

          # 将 sdkmanager 加入到 PATH
          echo "/usr/local/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          # 同时设置环境变量供后续步骤使用
          echo "ANDROID_HOME=/usr/local/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/android-sdk" >> $GITHUB_ENV

      - name: Accept Android Licenses
        run: |
          yes | sudo /usr/local/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install Required SDK Packages
        run: |
          sudo /usr/local/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;37.0.0" "platforms;android-33"

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stock-manager-apk
          path: bin/*.apk
